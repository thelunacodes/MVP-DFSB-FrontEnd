<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game Backlog</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="modal" class="modalBackground hidden">

        </div>
        <header>
            <h1 class="topheader">Game Backlog</h1>
            <button onclick="openModal()">Add Game</button>
        </header>
        <main>
            <table id="game-table">
                <tr align="center">
                    <th>Imagem</th>
                    <th>Nome</th>
                    <th>Dev(s)</th>
                    <th>Publisher</th>
                    <th>Platform</th>
                    <th>Link</th>
                    <th>Started at</th>
                    <th>Finished at</th>
                    <th>Score</th>
                    <!-- <th></th> -->
                </tr>
            </table>
        </main>

        <script src="index.js"></script>
        <script src="modal.js"></script>
    </body>
</html>
